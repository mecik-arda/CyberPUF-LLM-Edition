<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberPUF LLM Edition</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>CyberPUF <span>LLM Edition</span></h1>
            <p>Donanım Tabanlı (PUF) Büyük Dil Modeli Güvenlik Katmanı</p>
        </header>

        <div class="dashboard grid-layout">
            <div class="card status-card">
                <h2>Sistem Durumu</h2>
                <div class="status-item">
                    <span>PUF Anahtar Özeti (Hash):</span>
                    <strong id="puf-hash" class="highlight">Yükleniyor...</strong>
                </div>
                <div class="status-item">
                    <span>RAM Disk Bağlantısı (tmpfs):</span>
                    <strong id="ramdisk-status">Yükleniyor...</strong>
                </div>
                <div class="status-item">
                    <span>RAM Disk Konumu:</span>
                    <strong id="ramdisk-path">Yükleniyor...</strong>
                </div>
                <div class="status-item">
                    <span>Aktif LLM Modeli:</span>
                    <strong id="model-status">Yükleniyor...</strong>
                </div>
                <div class="status-item">
                    <span>Çalışma Süresi:</span>
                    <strong id="uptime">0s</strong>
                </div>
            </div>

            <div class="card controls-card">
                <h2>Yönetim Konsolu</h2>
                <div class="control-group">
                    <label>Şifrelenecek Model Klasörü:</label>
                    <input type="text" id="model-input-path" placeholder="/home/user/my_llama_model">
                    <label>Çıktı Dosyası (.cpuf_llm):</label>
                    <input type="text" id="model-output-path" placeholder="/home/user/my_llama_model.cpuf_llm">
                    <button id="btn-encrypt" class="btn primary">Modeli Şifrele</button>
                </div>
                <hr>
                <div class="control-group">
                    <label>Yüklenecek Güvenli Model (.cpuf_llm):</label>
                    <input type="text" id="cpuf-load-path" placeholder="/home/user/my_llama_model.cpuf_llm">
                    <button id="btn-load" class="btn success">RAM Diske Deşifre Et (Yükle)</button>
                    <button id="btn-zeroize" class="btn danger">Zeroize & RAM'i Temizle</button>
                </div>
            </div>
        </div>

        <div class="card terminal-card">
            <h2>İşlem Terminali</h2>
            <div class="terminal" id="terminal-output">
                <!-- Loglar buraya düşecek -->
            </div>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
